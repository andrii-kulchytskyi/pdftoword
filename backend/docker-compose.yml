version: '3.9'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LIBREOFFICE_CMD=soffice
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
